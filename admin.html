<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobcell • Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');
  :root{ --teal:#14C9AE; --teal-dark:#0FA893; --teal-light:#E4FBF7; --ink:#1B1D22; --ink-soft:#4A4E58; --paper:#F5F7F7; --card:#FFFFFF; --line:#E4E7E7; --warn:#F0A93A; --danger:#E5566B; --ok:#2FB675; --radius:14px; --shadow:0 1px 2px rgba(20,25,25,.04), 0 8px 24px -12px rgba(20,25,25,.10); }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;} body{font-family:'Manrope',system-ui,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;} button{font-family:inherit;cursor:pointer;} input,select,textarea{font-family:inherit;}
  #app{display:flex;min-height:100vh;}
  .sidebar{width:220px;flex-shrink:0;background:var(--ink);color:#fff;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 6px;}
  .brand-mark{font-family:'Space Grotesk';font-weight:700;font-size:19px;letter-spacing:-.02em;line-height:1;}
  .brand-mark .mob{color:var(--teal);} .brand-mark .cell{color:#fff;} .brand-sub{font-size:10.5px;color:#8B8F98;letter-spacing:.04em;margin-top:2px;}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1;}
  .nav button{all:unset;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:14px;font-weight:600;color:#C4C7CE;transition:background .15s,color .15s;}
  .nav button svg{width:17px;height:17px;flex-shrink:0;} .nav button:hover{background:#2A2C33;color:#fff;} .nav button.active{background:var(--teal);color:#08201C;}
  .nav-foot{font-size:11px;color:#6D717B;padding:10px 6px 0;border-top:1px solid #2A2C33;margin-top:10px;}
  .main{flex:1;min-width:0;padding:28px 34px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .topbar h1{font-size:22px;margin:0;letter-spacing:-.01em;} .topbar p{margin:2px 0 0;color:var(--ink-soft);font-size:13.5px;}
  .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13.5px;display:inline-flex;align-items:center;gap:8px;transition:transform .1s, box-shadow .15s;}
  .btn:active{transform:scale(.97);} .btn-primary{background:var(--teal);color:#08201C;box-shadow:0 4px 14px -4px rgba(20,201,174,.55);} .btn-primary:hover{background:var(--teal-dark);}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line);} .btn-ghost:hover{border-color:#c9cccc;} .btn-dark{background:var(--ink);color:#fff;} .btn-danger{background:#FCE9EC;color:var(--danger);}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;} .btn:disabled{opacity:.45;cursor:not-allowed;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);} .pad{padding:22px;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
  .stat{padding:16px 18px;border-radius:var(--radius);background:var(--card);border:1px solid var(--line);}
  .stat .num{font-family:'Space Grotesk';font-size:26px;font-weight:700;} .stat .lbl{font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
  .stat.accent{background:var(--ink);color:#fff;border-color:var(--ink);} .stat.accent .lbl{color:#9EA2AC;}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .filters select,.filters input{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13.5px;background:#fff;color:var(--ink);}
  .filters input[type=text]{flex:1;min-width:180px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;}
  td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle;} tr:last-child td{border-bottom:none;} tr.row-click{cursor:pointer;} tr.row-click:hover{background:#FAFBFB;}
  .mono{font-family:'Space Grotesk';font-weight:600;} .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11.5px;font-weight:700;}
  .badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .b-aberta{background:#EDEEF6;color:#5A5FBB;} .b-andamento{background:#FFF3E0;color:#B8791E;} .b-pecas{background:#FDEAEA;color:#C34C4C;} .b-pronto{background:var(--teal-light);color:var(--teal-dark);} .b-entregue{background:#EAF6EE;color:#2E9D5E;}
  .empty{padding:60px 20px;text-align:center;color:var(--ink-soft);} .empty svg{opacity:.35;margin-bottom:10px;}
  .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;} .form-grid.full{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:6px;} .field.span2{grid-column:span 2;}
  .field label{font-size:12.5px;font-weight:700;color:var(--ink-soft);}
  .field input,.field select,.field textarea{border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--ink);background:#fff;transition:border-color .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal);} .field textarea{resize:vertical;min-height:80px;}
  .section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--teal-dark);margin:26px 0 4px;} .section-title:first-child{margin-top:0;}
  hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0;}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .detail-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;align-items:start;}
  @media(max-width:900px){.detail-grid{grid-template-columns:1fr;} .form-grid{grid-template-columns:1fr;} .field.span2{grid-column:span 1;} .sidebar{display:none;}}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:8px 10px;font-size:13.5px;} .kv dt{color:var(--ink-soft);font-weight:600;} .kv dd{margin:0;font-weight:600;}
  .timeline{list-style:none;margin:0;padding:0;} .timeline li{position:relative;padding:0 0 16px 20px;border-left:2px solid var(--line);}
  .timeline li:last-child{border-color:transparent;padding-bottom:0;} .timeline li::before{content:"";position:absolute;left:-6px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--teal);border:2px solid #fff;}
  .timeline .t-status{font-weight:700;font-size:13.5px;} .timeline .t-date{font-size:11.5px;color:var(--ink-soft);}
  .status-actions{display:flex;flex-wrap:wrap;gap:8px;}
  .callout{border-radius:12px;padding:16px;background:var(--teal-light);border:1px solid #BDEFE6;font-size:13.5px;} .callout.warn{background:#FFF6E7;border-color:#F5DFAF;} .callout h4{margin:0 0 6px;font-size:13.5px;}
  .modal-bg{position:fixed;inset:0;background:rgba(20,22,25,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:#fff;border-radius:16px;max-width:440px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25);} .modal h3{margin:0 0 10px;} .modal p{color:var(--ink-soft);font-size:14px;line-height:1.5;} .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:80;display:flex;align-items:center;gap:10px;animation:toastin .2s ease;}
  @keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .manager-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .manager-card{border:1px solid var(--line);border-radius:12px;padding:16px;} .manager-card .fname{font-weight:800;font-size:14.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .tag-tcase{background:#EFF4D9;color:#6E7A1E;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:800;}
  .icon-btn{background:none;border:none;color:var(--ink-soft);padding:6px;border-radius:8px;display:inline-flex;} .icon-btn:hover{background:var(--paper);color:var(--ink);}
  .login-screen{position:fixed;inset:0;background:var(--paper);display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-box{background:#fff;padding:32px;border-radius:16px;box-shadow:var(--shadow);width:320px;text-align:center;}
  .login-box input{width:100%;margin:12px 0;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:14px;}
  .login-box button{width:100%;justify-content:center;margin-top:8px;}
  #laudoView{display:none;}
  .laudo-page{max-width:760px;margin:0 auto;background:#fff;padding:46px 50px;border:1px solid var(--line);border-radius:14px;}
  .laudo-head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--ink);padding-bottom:16px;margin-bottom:22px;}
  .laudo-head .lh-mob{font-family:'Space Grotesk';font-weight:800;font-size:26px;line-height:1;} .laudo-head .lh-mob .mob{color:var(--teal);}
  .laudo-title{text-align:right;} .laudo-title h2{margin:0;font-size:18px;} .laudo-title span{font-size:12px;color:var(--ink-soft);}
  .laudo-num{font-family:'Space Grotesk';font-weight:700;font-size:15px;}
  .laudo-section{margin-bottom:18px;} .laudo-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-dark);margin:0 0 8px;font-weight:800;}
  .laudo-kv{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:13px;} .laudo-kv div{display:flex;justify-content:space-between;border-bottom:1px dotted var(--line);padding:4px 0;} .laudo-kv div b{font-weight:700;}
  .laudo-block{font-size:13px;line-height:1.6;border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#FAFBFB;min-height:50px;white-space:pre-wrap;}
  .laudo-sign{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:44px;text-align:center;} .laudo-sign div{border-top:1px solid var(--ink);padding-top:8px;font-size:12px;color:var(--ink-soft);}
  .laudo-foot{margin-top:30px;font-size:10.5px;color:var(--ink-soft);text-align:center;}
  @media print{ body *{visibility:hidden;} #laudoView, #laudoView *{visibility:visible;} #laudoView{display:block;position:absolute;top:0;left:0;width:100%;} .laudo-page{border:none;box-shadow:none;max-width:100%;padding:20px 34px;} .no-print{display:none!important;} }
  ::placeholder{color:#A7ABB3;}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="brand-mark" style="font-size:24px;margin-bottom:8px;"><span class="mob">MOB</span>CELL</div>
    <p style="color:var(--ink-soft);font-size:13px;">Acesso restrito • Administrativo</p>
    <input type="password" id="senhaInput" placeholder="Digite a senha">
    <button class="btn btn-primary" onclick="fazerLogin()" style="width:100%;justify-content:center;">Entrar</button>
    <p id="loginErro" style="color:var(--danger);font-size:12px;display:none;margin-top:8px;">Senha incorreta</p>
  </div>
</div>

<div id="app" style="display:none;">
  <aside class="sidebar no-print">
    <div class="brand">
      <div>
        <div class="brand-mark"><span class="mob">MOB</span><span class="cell">CELL</span></div>
        <div class="brand-sub">ORDENS DE SERVIÇO • ADMIN</div>
      </div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="nav-foot">12 filiais • Mobcell &amp; Tcase</div>
  </aside>
  <main class="main">
    <div id="viewRoot"></div>
  </main>
</div>

<div id="laudoView"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
/* ============== CONFIGURAÇÃO ============== */
// ⬇️ COLE AQUI A URL DO SEU APPS SCRIPT (veja o passo 4 do tutorial)
const API_URL = 'https://script.google.com/macros/s/AKfycbzJJCVjpB1p_BU33z-yz7j4WzA81_qhOq_TmuauBZVF6GE5dKo3KOqWgmbajDX6pXU4/exec';
const SENHA_ADMIN = 'mobcell2026'; // 🔒 MUDE ESTA SENHA

/* ============== DADOS ============== */
const FILIAIS = ["Araruama","Bacaxá","Bacaxá Praça","Cabo Frio","Maricá","São Pedro","Rio Das Ostras","Unamar","Campos Centro","Campos Shopping","Tcase Pelinca","Tcase Boulevard"];
const STATUSES = ["Aberta","Em Andamento","Aguardando Peça","Pronto para Retirada","Entregue"];
const STATUS_CLASS = {"Aberta":"b-aberta","Em Andamento":"b-andamento","Aguardando Peça":"b-pecas","Pronto para Retirada":"b-pronto","Entregue":"b-entregue"};
const isTcase = f => f && f.startsWith("Tcase");

let STATE = { ordens:[], gerentes:{} };
let currentView = 'dashboard', currentOsId = null, dashFilters = {filial:'', status:'', q:''};

/* ============== UTILITÁRIOS ============== */
function uid(){ return Math.random().toString(36).slice(2,9)+Math.random().toString(36).slice(2,5); }
function fmtDate(iso){ if(!iso) return "—"; const d=new Date(iso); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+" "+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function fmtCPF(v){ v=(v||"").replace(/\D/g,'').slice(0,11); return v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); }
function fmtPhone(v){ v=(v||"").replace(/\D/g,'').slice(0,11); if(v.length<=10) return v.replace(/(\d{2})(\d{4})(\d{0,4})/,'($1) $2-$3').trim(); return v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3').trim(); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function showToast(msg, isError){ const root=document.getElementById('toastRoot'); const el=document.createElement('div'); el.className='toast'; el.style.background=isError?'#E5566B':'#1B1D22'; el.textContent=msg; root.appendChild(el); setTimeout(()=>el.remove(),3200); }
function nextOsNumber(){ const y=new Date().getFullYear(); const c=STATE.ordens.filter(o=>o.numero && o.numero.includes(`-${y}-`)).length+1; return `OS-${y}-${String(c).padStart(4,'0')}`; }

/* ============== API ============== */
async function apiGet(acao){ const r=await fetch(`${API_URL}?acao=${acao}`); return r.json(); }
async function apiPost(tipo, payload){ const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({tipo,...payload})}); return r.json(); }

async function loadData(){
  try{ STATE.ordens = await apiGet('ordens'); }catch(e){ showToast('Erro ao carregar ordens',true); STATE.ordens=[]; }
  try{ STATE.gerentes = await apiGet('gerentes'); }catch(e){ showToast('Erro ao carregar gerentes',true); STATE.gerentes={}; }
}
async function saveOrdens(){ try{ await apiPost('salvarOrdens',{ordens:STATE.ordens}); showToast('Dados salvos com sucesso'); }catch(e){ showToast('Erro ao salvar ordens',true); } }
async function saveGerentes(){ try{ await apiPost('salvarGerentes',{gerentes:STATE.gerentes}); showToast('Contatos salvos'); }catch(e){ showToast('Erro ao salvar gerentes',true); } }

/* ============== LOGIN ============== */
function fazerLogin(){ if(document.getElementById('senhaInput').value===SENHA_ADMIN){ document.getElementById('loginScreen').style.display='none'; document.getElementById('app').style.display='flex'; initApp(); } else { document.getElementById('loginErro').style.display='block'; } }

/* ============== NAVEGAÇÃO ============== */
const NAV_ITEMS = [
  {id:'dashboard', label:'Ordens de Serviço', icon:'list'},
  {id:'nova', label:'Nova OS', icon:'plus'},
  {id:'gerentes', label:'Gerentes', icon:'users'},
];
const ICONS = {
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
  plus:'<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
};
function renderNav(){
  const nav=document.getElementById('navList');
  nav.innerHTML=NAV_ITEMS.map(it=>`<button data-nav="${it.id}" class="${currentView===it.id?'active':''}"><svg viewBox="0 0 24 24" fill="none">${ICONS[it.icon]}</svg>${it.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{currentView=b.dataset.nav;currentOsId=null;render();});
}

/* ============== RENDER PRINCIPAL ============== */
function render(){ renderNav(); const root=document.getElementById('viewRoot'); if(currentView==='dashboard') root.innerHTML=viewDashboard(); else if(currentView==='nova') root.innerHTML=viewNovaOS(); else if(currentView==='detalhe') root.innerHTML=viewDetalhe(currentOsId); else if(currentView==='gerentes') root.innerHTML=viewGerentes(); attachHandlers(); }

/* ============== DASHBOARD ============== */
function viewDashboard(){
  const total=STATE.ordens.length; const abertas=STATE.ordens.filter(o=>o.status!=='Entregue').length; const prontas=STATE.ordens.filter(o=>o.status==='Pronto para Retirada').length;
  const entreguesHoje=STATE.ordens.filter(o=>{ if(o.status!=='Entregue'||!o.entregueEm) return false; const d=new Date(o.entregueEm), t=new Date(); return d.toDateString()===t.toDateString(); }).length;
  let list=STATE.ordens.slice().sort((a,b)=>new Date(b.criadaEm)-new Date(a.criadaEm));
  if(dashFilters.filial) list=list.filter(o=>o.filial===dashFilters.filial);
  if(dashFilters.status) list=list.filter(o=>o.status===dashFilters.status);
  if(dashFilters.q){ const q=dashFilters.q.toLowerCase(); list=list.filter(o=>(o.numero||'').toLowerCase().includes(q)||(o.clienteNome||'').toLowerCase().includes(q)||(o.cpf||'').includes(q)); }
  const rows=list.map(o=>`<tr class="row-click" data-open="${o.id}"><td class="mono">${o.numero}</td><td>${escapeHtml(o.clienteNome)}</td><td>${escapeHtml(o.marca||'')} ${escapeHtml(o.modelo||'')}</td><td>${escapeHtml(o.filial)}</td><td><span class="badge ${STATUS_CLASS[o.status]}">${o.status}</span></td><td>${fmtDate(o.criadaEm)}</td></tr>`).join('');
  return `<div class="topbar"><div><h1>Ordens de Serviço</h1><p>Painel geral das 12 filiais</p></div><button class="btn btn-primary" data-nav="nova"><svg width="15" height="15" viewBox="0 0 24 24" fill="none">${ICONS.plus}</svg>Nova OS</button></div>
  <div class="stats"><div class="stat accent"><div class="num">${total}</div><div class="lbl">Total de ordens</div></div><div class="stat"><div class="num">${abertas}</div><div class="lbl">Em aberto</div></div><div class="stat"><div class="num">${prontas}</div><div class="lbl">Prontas p/ retirada</div></div><div class="stat"><div class="num">${entreguesHoje}</div><div class="lbl">Entregues hoje</div></div></div>
  <div class="card pad"><div class="filters"><input type="text" id="fq" placeholder="Buscar por nº, cliente ou CPF..." value="${escapeHtml(dashFilters.q)}"><select id="fFilial"><option value="">Todas as filiais</option>${FILIAIS.map(f=>`<option value="${f}" ${dashFilters.filial===f?'selected':''}>${f}</option>`).join('')}</select><select id="fStatus"><option value="">Todos os status</option>${STATUSES.map(s=>`<option value="${s}" ${dashFilters.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
  ${list.length?`<div style="overflow-x:auto;"><table><thead><tr><th>Nº OS</th><th>Cliente</th><th>Produto</th><th>Filial</th><th>Status</th><th>Aberta em</th></tr></thead><tbody>${rows}</tbody></table></div>`:`<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none">${ICONS.list}</svg><div><b>Nenhuma ordem encontrada.</b><br>Ajuste os filtros ou cadastre uma nova OS.</div></div>`}</div>`;
}

/* ============== NOVA OS ============== */
function viewNovaOS(){
  return `<div class="topbar"><div><h1>Nova Ordem de Serviço</h1><p>Preencha os dados do cliente e do aparelho</p></div><button class="btn btn-ghost" data-nav="dashboard">Cancelar</button></div>
  <div class="card pad"><form id="formNovaOS">
  <div class="section-title">Filial</div><div class="form-grid"><div class="field span2"><label>Filial responsável *</label><select name="filial" required><option value="">Selecione a filial</option>${FILIAIS.map(f=>`<option value="${f}">${f}</option>`).join('')}</select></div></div>
  <div class="section-title">Cliente</div><div class="form-grid"><div class="field"><label>Nome completo *</label><input name="clienteNome" required placeholder="Nome do cliente"></div><div class="field"><label>CPF *</label><input name="cpf" required placeholder="000.000.000-00" maxlength="14"></div><div class="field"><label>Telefone *</label><input name="telefone" required placeholder="(00) 00000-0000" maxlength="15"></div><div class="field"><label>E-mail</label><input name="email" type="email" placeholder="opcional"></div></div>
  <div class="section-title">Produto</div><div class="form-grid"><div class="field"><label>Tipo de produto *</label><select name="tipoProduto" required><option value="">Selecione</option><option>Smartphone</option><option>Tablet</option><option>Notebook</option><option>Smartwatch</option><option>Acessório</option><option>Outro</option></select></div><div class="field"><label>Marca *</label><input name="marca" required placeholder="Ex: Samsung, Apple"></div><div class="field"><label>Modelo *</label><input name="modelo" required placeholder="Ex: A54, iPhone 13"></div><div class="field"><label>IMEI / Nº de série</label><input name="imei" placeholder="opcional"></div><div class="field span2"><label>Acessórios entregues junto</label><input name="acessorios" placeholder="Ex: capinha, carregador, fone"></div></div>
  <div class="section-title">Serviço</div><div class="form-grid"><div class="field span2"><label>Defeito relatado pelo cliente *</label><textarea name="defeito" required placeholder="Descreva o problema informado pelo cliente"></textarea></div><div class="field"><label>Técnico responsável</label><input name="tecnico" placeholder="Nome do técnico"></div><div class="field"><label>Previsão de entrega</label><input name="previsao" type="date"></div><div class="field"><label>Valor orçado (R$)</label><input name="valor" type="number" step="0.01" placeholder="0,00"></div><div class="field"><label>Garantia do serviço (dias)</label><input name="garantia" type="number" value="90"></div></div>
  <hr class="sep"><div style="display:flex;justify-content:flex-end;gap:10px;"><button type="button" class="btn btn-ghost" data-nav="dashboard">Cancelar</button><button type="submit" class="btn btn-primary">Cadastrar ordem de serviço</button></div></form></div>`;
}
async function handleNovaOSSubmit(e){
  e.preventDefault(); const fd=new FormData(e.target); const o=Object.fromEntries(fd.entries()); const now=new Date().toISOString();
  const novaOS={id:uid(),numero:nextOsNumber(),filial:o.filial,clienteNome:o.clienteNome,cpf:o.cpf,telefone:o.telefone,email:o.email||'',tipoProduto:o.tipoProduto,marca:o.marca,modelo:o.modelo,imei:o.imei||'',acessorios:o.acessorios||'',defeito:o.defeito,tecnico:o.tecnico||'',previsao:o.previsao||'',valor:o.valor||'',garantia:o.garantia||'90',diagnostico:'',servicoRealizado:'',pecasUtilizadas:'',status:'Aberta',criadaEm:now,entregueEm:null,historico:[{status:'Aberta',em:now}]};
  STATE.ordens.push(novaOS); await saveOrdens(); showToast(`OS ${novaOS.numero} cadastrada com sucesso.`); currentOsId=novaOS.id; currentView='detalhe'; render();
}

/* ============== DETALHE ============== */
function viewDetalhe(id){
  const o=STATE.ordens.find(x=>x.id===id); if(!o) return `<div class="empty">Ordem não encontrada. <button class="btn btn-ghost" data-nav="dashboard">Voltar</button></div>`;
  const gerente=STATE.gerentes[o.filial]||{};
  const tl=o.historico.slice().reverse().map(h=>`<li><div class="t-status">${h.status}</div><div class="t-date">${fmtDate(h.em)}</div></li>`).join('');
  const statusBtns=STATUSES.map(s=>`<button class="btn btn-sm ${s===o.status?'btn-dark':'btn-ghost'}" data-setstatus="${s}" ${s===o.status?'disabled':''}>${s}</button>`).join('');
  let notifyBlock='';
  if(o.status==='Pronto para Retirada'){
    if(gerente.telefone){ const msg=encodeURIComponent(`Olá ${gerente.nome||''}, a OS ${o.numero} (${o.clienteNome} - ${o.marca} ${o.modelo}) está PRONTA para retirada na filial ${o.filial}.`); const wa=`https://wa.me/55${gerente.telefone.replace(/\D/g,'')}?text=${msg}`; notifyBlock=`<div class="callout"><h4>Aparelho pronto — avisar gerente</h4><p style="margin:0 0 10px;">Gerente da filial: <b>${escapeHtml(gerente.nome)}</b> · ${fmtPhone(gerente.telefone)}</p><a class="btn btn-primary btn-sm" href="${wa}" target="_blank" rel="noopener" style="text-decoration:none;">Avisar via WhatsApp</a></div>`; }
    else { notifyBlock=`<div class="callout warn"><h4>Nenhum gerente cadastrado para ${escapeHtml(o.filial)}</h4><p style="margin:0 0 10px;">Cadastre o contato do gerente para poder enviar o aviso de "pronto".</p><button class="btn btn-sm btn-ghost" data-nav="gerentes">Cadastrar gerente</button></div>`; }
  }
  return `<div class="topbar"><div><h1 class="mono">${o.numero}</h1><p>${escapeHtml(o.filial)} · Aberta em ${fmtDate(o.criadaEm)}</p></div><div style="display:flex;gap:10px;"><button class="btn btn-ghost" data-nav="dashboard">← Voltar</button><button class="btn btn-dark" data-laudo="${o.id}">Emitir laudo</button></div></div>
  <div class="detail-grid"><div style="display:flex;flex-direction:column;gap:16px;"><div class="card pad"><div class="detail-head"><span class="badge ${STATUS_CLASS[o.status]}" style="font-size:13px;padding:6px 13px;">${o.status}</span></div>
  <div class="section-title" style="margin-top:0;">Cliente</div><dl class="kv"><dt>Nome</dt><dd>${escapeHtml(o.clienteNome)}</dd><dt>CPF</dt><dd>${escapeHtml(o.cpf)}</dd><dt>Telefone</dt><dd>${escapeHtml(o.telefone)}</dd><dt>E-mail</dt><dd>${escapeHtml(o.email)||'—'}</dd></dl>
  <div class="section-title">Produto</div><dl class="kv"><dt>Tipo</dt><dd>${escapeHtml(o.tipoProduto)}</dd><dt>Marca / Modelo</dt><dd>${escapeHtml(o.marca)} ${escapeHtml(o.modelo)}</dd><dt>IMEI / Série</dt><dd>${escapeHtml(o.imei)||'—'}</dd><dt>Acessórios</dt><dd>${escapeHtml(o.acessorios)||'—'}</dd></dl>
  <div class="section-title">Serviço</div><dl class="kv"><dt>Defeito relatado</dt><dd>${escapeHtml(o.defeito)}</dd><dt>Técnico</dt><dd>${escapeHtml(o.tecnico)||'—'}</dd><dt>Previsão</dt><dd>${o.previsao?new Date(o.previsao+'T00:00').toLocaleDateString('pt-BR'):'—'}</dd><dt>Valor</dt><dd>${o.valor?'R$ '+Number(o.valor).toFixed(2):'—'}</dd><dt>Garantia</dt><dd>${o.garantia||'90'} dias</dd></dl>
  <div class="section-title">Diagnóstico técnico (usado no laudo)</div><div class="form-grid full"><div class="field"><textarea id="diagnostico" placeholder="Diagnóstico técnico do defeito">${escapeHtml(o.diagnostico)}</textarea></div><div class="field"><label>Serviço realizado</label><textarea id="servicoRealizado" placeholder="O que foi feito no aparelho">${escapeHtml(o.servicoRealizado)}</textarea></div><div class="field"><label>Peças utilizadas</label><textarea id="pecasUtilizadas" placeholder="Peças / componentes trocados">${escapeHtml(o.pecasUtilizadas)}</textarea></div></div><div style="display:flex;justify-content:flex-end;margin-top:10px;"><button class="btn btn-sm btn-primary" data-savetech="${o.id}">Salvar diagnóstico</button></div></div></div>
  <div style="display:flex;flex-direction:column;gap:16px;"><div class="card pad"><div class="section-title" style="margin-top:0;">Alterar status</div><div class="status-actions">${statusBtns}</div></div>${notifyBlock}<div class="card pad"><div class="section-title" style="margin-top:0;">Histórico</div><ul class="timeline">${tl}</ul></div></div></div>`;
}
async function setStatus(id,status){
  const o=STATE.ordens.find(x=>x.id===id); if(!o) return; o.status=status; o.historico.push({status,em:new Date().toISOString()}); if(status==='Entregue') o.entregueEm=new Date().toISOString(); await saveOrdens(); showToast(`Status atualizado para "${status}".`); render();
}
async function saveTech(id){
  const o=STATE.ordens.find(x=>x.id===id); if(!o) return; o.diagnostico=document.getElementById('diagnostico').value; o.servicoRealizado=document.getElementById('servicoRealizado').value; o.pecasUtilizadas=document.getElementById('pecasUtilizadas').value; await saveOrdens(); showToast('Diagnóstico salvo.');
}

/* ============== GERENTES ============== */
function viewGerentes(){
  const cards=FILIAIS.map(f=>{ const g=STATE.gerentes[f]||{nome:'',telefone:''}; return `<div class="manager-card"><div class="fname">${f} ${isTcase(f)?'<span class="tag-tcase">TCASE</span>':''}</div><div class="field" style="margin-bottom:8px;"><label>Nome do gerente</label><input data-gnome="${f}" value="${escapeHtml(g.nome)}" placeholder="Nome"></div><div class="field" style="margin-bottom:10px;"><label>WhatsApp (com DDD)</label><input data-gfone="${f}" value="${escapeHtml(g.telefone)}" placeholder="(00) 00000-0000" maxlength="15"></div><button class="btn btn-sm btn-primary" data-savegerente="${f}">Salvar contato</button></div>`; }).join('');
  return `<div class="topbar"><div><h1>Gerentes das filiais</h1><p>Cadastre o contato usado para os avisos de "pronto para retirada"</p></div></div><div class="manager-grid">${cards}</div>`;
}
async function saveGerente(filial){
  const nome=document.querySelector(`[data-gnome="${filial}"]`).value.trim(); const telefone=document.querySelector(`[data-gfone="${filial}"]`).value.trim(); STATE.gerentes[filial]={nome,telefone}; await saveGerentes(); showToast(`Contato de ${filial} salvo.`);
}

/* ============== LAUDO ============== */
function openLaudo(id){
  const o=STATE.ordens.find(x=>x.id===id); if(!o) return; const tcase=isTcase(o.filial);
  const logoBlock=tcase?`<div style="font-family:'Space Grotesk';font-weight:800;font-size:26px;">TCASE</div>`:`<div class="lh-mob"><span class="mob">MOB</span>CELL</div>`;
  const html=`<div class="laudo-page"><div class="laudo-head">${logoBlock}<div class="laudo-title"><h2>Laudo Técnico</h2><span>Ordem de Serviço</span><br><span class="laudo-num">${o.numero}</span></div></div>
  <div class="laudo-section"><h4>Dados da filial e do cliente</h4><div class="laudo-kv"><div><span>Filial</span><b>${escapeHtml(o.filial)}</b></div><div><span>Data de abertura</span><b>${fmtDate(o.criadaEm)}</b></div><div><span>Cliente</span><b>${escapeHtml(o.clienteNome)}</b></div><div><span>CPF</span><b>${escapeHtml(o.cpf)}</b></div><div><span>Telefone</span><b>${escapeHtml(o.telefone)}</b></div><div><span>E-mail</span><b>${escapeHtml(o.email)||'—'}</b></div></div></div>
  <div class="laudo-section"><h4>Produto</h4><div class="laudo-kv"><div><span>Tipo</span><b>${escapeHtml(o.tipoProduto)}</b></div><div><span>Marca / Modelo</span><b>${escapeHtml(o.marca)} ${escapeHtml(o.modelo)}</b></div><div><span>IMEI / Série</span><b>${escapeHtml(o.imei)||'—'}</b></div><div><span>Acessórios</span><b>${escapeHtml(o.acessorios)||'—'}</b></div></div></div>
  <div class="laudo-section"><h4>Defeito relatado pelo cliente</h4><div class="laudo-block">${escapeHtml(o.defeito)||'—'}</div></div>
  <div class="laudo-section"><h4>Diagnóstico técnico</h4><div class="laudo-block">${escapeHtml(o.diagnostico)||'—'}</div></div>
  <div class="laudo-section"><h4>Serviço realizado</h4><div class="laudo-block">${escapeHtml(o.servicoRealizado)||'—'}</div></div>
  <div class="laudo-section"><h4>Peças utilizadas</h4><div class="laudo-block">${escapeHtml(o.pecasUtilizadas)||'Nenhuma'}</div></div>
  <div class="laudo-section"><div class="laudo-kv"><div><span>Técnico responsável</span><b>${escapeHtml(o.tecnico)||'—'}</b></div><div><span>Valor do serviço</span><b>${o.valor?'R$ '+Number(o.valor).toFixed(2):'—'}</b></div><div><span>Garantia</span><b>${o.garantia||'90'} dias a partir da entrega</b></div><div><span>Status atual</span><b>${o.status}</b></div></div></div>
  <div class="laudo-sign"><div>Assinatura do técnico</div><div>Assinatura do cliente</div></div>
  <div class="laudo-foot">${tcase?'Tcase':'Mobcell'} · ${escapeHtml(o.filial)} · Documento gerado em ${fmtDate(new Date().toISOString())}</div></div>`;
  document.getElementById('laudoView').innerHTML=html; window.print();
}

/* ============== EVENTOS ============== */
function attachHandlers(){
  document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{currentView=b.dataset.nav;currentOsId=null;render();});
  document.querySelectorAll('[data-open]').forEach(tr=>tr.onclick=()=>{currentOsId=tr.dataset.open;currentView='detalhe';render();});
  document.querySelectorAll('[data-setstatus]').forEach(b=>b.onclick=()=>setStatus(currentOsId,b.dataset.setstatus));
  document.querySelectorAll('[data-savetech]').forEach(b=>b.onclick=()=>saveTech(b.dataset.savetech));
  document.querySelectorAll('[data-savegerente]').forEach(b=>b.onclick=()=>saveGerente(b.dataset.savegerente));
  document.querySelectorAll('[data-laudo]').forEach(b=>b.onclick=()=>openLaudo(b.dataset.laudo));
  const form=document.getElementById('formNovaOS'); if(form){form.onsubmit=handleNovaOSSubmit; const cpfEl=form.querySelector('[name=cpf]'); if(cpfEl) cpfEl.oninput=e=>e.target.value=fmtCPF(e.target.value); const telEl=form.querySelector('[name=telefone]'); if(telEl) telEl.oninput=e=>e.target.value=fmtPhone(e.target.value);}
  const fq=document.getElementById('fq'); if(fq) fq.oninput=e=>{dashFilters.q=e.target.value; render(); document.getElementById('fq').focus(); document.getElementById('fq').selectionStart=document.getElementById('fq').value.length;};
  const fFilial=document.getElementById('fFilial'); if(fFilial) fFilial.onchange=e=>{dashFilters.filial=e.target.value; render();};
  const fStatus=document.getElementById('fStatus'); if(fStatus) fStatus.onchange=e=>{dashFilters.status=e.target.value; render();};
  document.querySelectorAll('[data-gfone]').forEach(inp=>inp.oninput=e=>e.target.value=fmtPhone(e.target.value));
}

/* ============== INICIALIZAÇÃO ============== */
async function initApp(){ document.getElementById('viewRoot').innerHTML=`<div class="empty">Carregando...</div>`; await loadData(); render(); }
</script>
</body>
</html>
